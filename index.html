<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alwin Thomas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Hamburger menu -->
  <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- Nav drawer -->
  <div class="nav-overlay" id="nav-overlay"></div>
  <nav class="nav-drawer" id="nav-drawer" aria-hidden="true">
    <div class="nav-drawer-header">
      <span class="nav-drawer-title">Pages</span>
      <button class="nav-close" id="nav-close" aria-label="Close menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <ul class="nav-list">
      <li><a class="nav-item" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Home
      </a></li>
      <li><a class="nav-item" href="sudoku.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
        </svg>
        Sudoku
      </a></li>
      <li><a class="nav-item" href="music.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        Mood Radio
      </a></li>
    </ul>
  </nav>

  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
    <!-- Sun -->
    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <!-- Moon -->
    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <main class="card">
    <div class="avatar-wrap">
      <img
        class="avatar"
        src="https://api.dicebear.com/9.x/notionists/svg?seed=yourname"
        alt="Avatar"
      />
    </div>

    <h1 class="name">Alwin Thomas</h1>
    <p class="role">Principal Architect,<br>JPMorgan Chase</p>

    <p class="bio">
      Hi, I'm a passionate technologist who loves building clean, useful software,
      leveraging the latest advancements in Artificial Intelligence.
    </p>

    <div class="links">
      <a
        class="btn-linkedin"
        href="https://www.linkedin.com/in/alwinthomas"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="View LinkedIn profile"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="#0a66c2" aria-hidden="true">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
    </div>

    <p class="sudoku-teaser">Bored? Try some <a href="sudoku.html" class="sudoku-link">Sudoku</a>.</p>

    <div class="divider"></div>

    <section class="contact">
      <h2>Get in touch</h2>
      <!-- Formspree: replace YOUR_FORM_ID after signing up at https://formspree.io -->
      <form class="form" id="contact-form">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Jane Smith" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" required />
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="4" placeholder="Say hello…" required></textarea>
        </div>
        <button type="submit" class="btn btn-submit">Send message</button>
        <p class="form-status" id="form-status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script>
    // ── Dark mode ─────────────────────────────────────────────
    const root = document.documentElement;
    const toggleBtn = document.getElementById('theme-toggle');

    const saved = localStorage.getItem('theme');
    if (saved) {
      root.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      root.setAttribute('data-theme', 'dark');
    }

    toggleBtn.addEventListener('click', () => {
      const isDark = root.getAttribute('data-theme') === 'dark';
      const next = isDark ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // ── Hamburger nav ─────────────────────────────────────────
    const hamburger = document.getElementById('hamburger');
    const navDrawer = document.getElementById('nav-drawer');
    const navOverlay = document.getElementById('nav-overlay');
    const navClose = document.getElementById('nav-close');

    function openNav() {
      navDrawer.classList.add('open');
      navOverlay.classList.add('open');
      hamburger.setAttribute('aria-expanded', 'true');
      navDrawer.setAttribute('aria-hidden', 'false');
    }

    function closeNav() {
      navDrawer.classList.remove('open');
      navOverlay.classList.remove('open');
      hamburger.setAttribute('aria-expanded', 'false');
      navDrawer.setAttribute('aria-hidden', 'true');
    }

    hamburger.addEventListener('click', openNav);
    navClose.addEventListener('click', closeNav);
    navOverlay.addEventListener('click', closeNav);

    // ── Contact form → Formspree ──────────────────────────────
    const FORMSPREE_ID = 'mvzbjenk';

    document.getElementById('contact-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const status = document.getElementById('form-status');
      const btn = this.querySelector('button[type="submit"]');

      btn.disabled = true;
      btn.textContent = 'Sending…';
      status.textContent = '';
      status.className = 'form-status';

      try {
        const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: new FormData(this),
        });

        if (res.ok) {
          status.textContent = 'Thanks! I\'ll get back to you soon.';
          status.classList.add('success');
          this.reset();
        } else {
          const data = await res.json();
          status.textContent = data?.errors?.[0]?.message || 'Something went wrong. Please try again.';
          status.classList.add('error');
        }
      } catch {
        status.textContent = 'Network error. Please try again.';
        status.classList.add('error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send message';
      }
    });
  </script>
</body>
</html>
